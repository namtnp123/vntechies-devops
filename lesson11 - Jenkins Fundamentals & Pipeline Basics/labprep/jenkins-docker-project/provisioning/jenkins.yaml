jenkins:
  nodes:
  - permanent:
      launcher:
        inbound:
          workDirSettings:
            disabled: false
            failIfWorkDirIsMissing: false
            internalDir: "remoting"
      name: "docker-node"
      remoteFS: "/home/jenkins/agent"
      retentionStrategy: "always"

credentials:
  system:
    domainCredentials:
    - credentials:
      # Username/Password credentials for Docker registry
      - usernamePassword:
          scope: GLOBAL
          id: "DOCKER_REGISTRY_CREDS"
          description: "Docker Registry Credentials"
          username: "${DOCKER_REGISTRY_USER:-admin}"
          password: "${DOCKER_REGISTRY_PASS:-password123}"

      # Username/Password credentials GIT Personal Access Token
      - usernamePassword:
          scope: GLOBAL
          id: "GITHUB_PAT_CREDS"
          description: "GitHub Personal Access Token"
          username: "${GITHUB_USER:-admin}"
          password: "${GITHUB_PAT:-password123}"

security:
  globalJobDslSecurityConfiguration:
    useScriptSecurity: false

# Shared Library Configuration
unclassified:
  globalLibraries:
    libraries:
    - defaultVersion: "main"
      name: "cicd"
      retriever:
        modernSCM:
          libraryPath: "./"
          scm:
            github:
              configuredByUrl: true
              credentialsId: "GITHUB_PAT_CREDS"
              repositoryUrl: "https://github.com/devopsway/devops-project-cicd.git"
              traits:
              - gitHubBranchDiscovery:
                  strategyId: 1