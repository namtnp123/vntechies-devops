apiVersion: 1

providers:
  - name: 'Prometheus Dashboards'
    orgId: 1
    folder: 'Prometheus'
    folderUid: 'prometheus-folder'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/Prometheus/dashboards
      foldersFromFilesStructure: false